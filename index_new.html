<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROTOCOL:JUNGYH | Modern Dev Log</title>
    <link rel="icon" href="public/favicon.ico" />
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --punk-pink: #d6517d;
            --punk-neon: #ff3860;
            --text-white: #ffffff;
            --card-bg: rgba(0, 0, 0, 0.95);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000;
            color: var(--text-white);
            font-family: 'VT323', monospace;
            overflow: hidden;
        }

        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-image: url('public/assets/parallax-bg.gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .dark-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            background: rgba(0, 0, 0, 0.88);
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }

        .dark-overlay.active {
            opacity: 1;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            position: fixed;
            width: 100%;
            box-sizing: border-box;
            top: 0;
            z-index: 101;
        }

        .nav-links { display: flex; gap: 40px; font-size: 1.6rem; }
        .nav-links a { text-decoration: none; color: white; transition: 0.3s; }
        .nav-links a:hover { color: var(--punk-pink); }

        .social-icons { display: flex; gap: 20px; }
        .social-icons img { width: 30px; height: 30px; filter: drop-shadow(0 0 5px var(--punk-pink)); cursor: pointer; }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: all 0.8s ease;
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .hero.hidden {
            transform: translateY(-100px);
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 4rem;
            text-shadow: 6px 6px 0px var(--punk-pink);
            margin-bottom: 20px;
        }

        .description {
            font-size: 2rem;
            max-width: 800px;
            margin-bottom: 40px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
        }

        .enter-btn {
            background: var(--punk-pink);
            color: white;
            padding: 25px 50px;
            font-family: 'Press Start 2P', cursive;
            border: none;
            box-shadow: 6px 6px 0px #000;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .enter-btn:hover {
            background: var(--punk-neon);
            transform: scale(1.05);
        }

        .archive-content {
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1200px;
            display: none;
            opacity: 0;
            transition: opacity 1s ease;
            z-index: 102;
            padding-bottom: 100px;
        }

        .archive-content.active {
            display: block;
            opacity: 1;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .category-card {
            background: var(--card-bg);
            border: 4px solid #000;
            box-shadow: 12px 12px 0px var(--punk-pink);
            padding: 30px;
        }

        .category-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.5rem;
            color: var(--punk-pink);
            margin-bottom: 20px;
            display: block;
            border-bottom: 2px solid #fff;
            padding-bottom: 10px;
        }

        .topic-list { list-style: none; padding: 0; margin: 0; }
        .topic-item { margin-bottom: 15px; }
        .topic-link {
            text-decoration: none;
            color: #fff;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            transition: 0.2s;
        }
        .topic-link:hover { color: var(--punk-pink); padding-left: 10px; }
        .topic-link::before { content: '>'; margin-right: 10px; color: var(--punk-pink); }

        .close-btn {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.9rem;
            color: white;
            cursor: pointer;
            margin-bottom: 40px;
            display: inline-block;
            transition: 0.3s;
        }
        .close-btn:hover { color: var(--punk-pink); }

        .loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 4px;
            background: linear-gradient(to right, var(--punk-pink), var(--punk-neon));
            z-index: 200;
            transition: width 0.3s ease;
        }

        .loading-bar.active {
            animation: loadingProgress 1.5s ease-in-out forwards;
        }

        @keyframes loadingProgress {
            0% { width: 10%; }
            50% { width: 60%; }
            100% { width: 90%; }
        }

        .loading-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Press Start 2P', cursive;
            font-size: 2rem;
            color: var(--punk-pink);
            text-shadow: 6px 6px 0px #000;
            z-index: 199;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .loading-text.active {
            opacity: 1;
            animation: blink 0.5s step-start infinite;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.6; }
        }

    </style>
</head>

<body>

    <div class="loading-bar" id="loading-bar"></div>
    <div class="loading-text" id="loading-text">MOVING TO PAGES...</div>

    <div class="background-container" id="bg-layer"></div>
    <div class="dark-overlay" id="overlay"></div>

    <nav>
        <div class="nav-links">
            <a href="index.html">HOME</a>
            <a href="#" onclick="showArchive()">BLOG</a>
            <a href="https://butter-black.vercel.app/" target="_blank">BOOKS</a>
            <a href="https://stock-nine-blue.vercel.app/" target="_blank">STOCKS</a>
            <a href="#">TEAM</a>
        </div>
        <div class="social-icons">
            <img src="public/assets/facebook_32x32.png" alt="FB">
            <img src="public/assets/twitter_32x32.png" alt="TW">
            <img src="public/assets/email_32x32.png" alt="MAIL">
        </div>
    </nav>

    <div class="hero" id="hero-section">
        <h1>PROTOCOL:JUNGYH</h1>
        <p class="description">SYSTEM 2026: DECODING HUMAN KNOWLEDGE...</p>
        <button class="enter-btn" onclick="showArchive()">ENTER BLOG</button>
    </div>

    <div class="archive-content" id="archive-section">
        <div class="close-btn" onclick="hideArchive()">[ BACK TO MAIN ]</div>
        <div class="category-grid">
            
            <section class="category-card">
                <span class="category-title">OS</span>
                <ul class="topic-list">
                    <li class="topic-item"><a href="os-topic-1.html" class="topic-link">HARDWARE</a></li>
                    <li class="topic-item"><a href="os-topic-2.html" class="topic-link">MEMORY</a></li>
                    <li class="topic-item"><a href="os-topic-3.html" class="topic-link">SCHEDULING I</a></li>
                    <li class="topic-item"><a href="os-topic-4.html" class="topic-link">SCHEDULING II</a></li>
                    <li class="topic-item"><a href="os-topic-5.html" class="topic-link">DEADLOCK</a></li>
                </ul>
            </section>

            <section class="category-card">
                <span class="category-title">TS</span>
                <ul class="topic-list">
                    <li class="topic-item"><a href="ts-topic-1.html" class="topic-link">GENERICS</a></li>
                    <li class="topic-item"><a href="ts-topic-2.html" class="topic-link">CONDITIONAL</a></li>
                </ul>
            </section>

            <section class="category-card">
                <span class="category-title">NODE</span>
                <ul class="topic-list">
                    <li class="topic-item"><a href="#" class="topic-link" style="opacity: 0.4;">DECODING...</a></li>
                </ul>
            </section>

            <section class="category-card">
                <span class="category-title">MSA</span>
                <ul class="topic-list">
                    <li class="topic-item"><a href="#" class="topic-link" style="opacity: 0.4;">SCANNING...</a></li>
                </ul>
            </section>

        </div>
    </div>

    <script>
        const hero = document.getElementById('hero-section');
        const archive = document.getElementById('archive-section');
        const overlay = document.getElementById('overlay');
        const bgLayer = document.getElementById('bg-layer');
        const loadingBar = document.getElementById('loading-bar');
        const loadingText = document.getElementById('loading-text');

        function showArchive() {
            hero.classList.add('hidden');
            overlay.classList.add('active');
            
            archive.style.display = 'block';
            setTimeout(() => {
                archive.classList.add('active');
                document.body.style.overflow = 'auto';
            }, 100);
        }

        function hideArchive() {
            archive.classList.remove('active');
            overlay.classList.remove('active');
            bgLayer.style.transform = 'none';
            
            setTimeout(() => {
                hero.classList.remove('hidden');
            }, 100);
            
            setTimeout(() => {
                archive.style.display = 'none';
                document.body.style.overflow = 'hidden';
                window.scrollTo(0, 0);
            }, 800);
        }

        window.addEventListener('load', () => {
            bgLayer.style.transform = 'none';
        });

        // Loading bar functionality
        document.addEventListener('click', (e) => {
            const link = e.target.closest('a');
            if (link && !link.onclick) {
                const href = link.getAttribute('href');
                if (href && href !== '#' && (href.startsWith('http') || href.endsWith('.html'))) {
                    e.preventDefault();
                    loadingBar.classList.add('active');
                    loadingText.classList.add('active');
                    
                    setTimeout(() => {
                        if (href.startsWith('http')) {
                            window.open(href, '_blank');
                        } else {
                            window.location.href = href;
                        }
                        loadingBar.classList.remove('active');
                        loadingText.classList.remove('active');
                    }, 1500);
                }
            }
        });
    </script>
</body>
</html>
